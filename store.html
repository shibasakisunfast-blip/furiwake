<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>商品予約 — 店舗用</title>
<style>
  :root {
    --bg: #f7f8fc;
    --surface: #ffffff;
    --border: #e2e5ef;
    --text: #1a1d2e;
    --text2: #5c607a;
    --accent: #3d5aff;
    --accent-light: #eef0ff;
    --success: #0e9f6e;
    --success-light: #e9faf5;
    --warn: #d97706;
    --warn-light: #fffbeb;
    --radius: 10px;
    --shadow: 0 1px 4px rgba(0,0,0,.08);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Hiragino Sans', 'Meiryo', sans-serif;
         background: var(--bg); color: var(--text); font-size: 15px; line-height: 1.6; }

  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 14px 20px;
    display: flex;
    align-items: center;
    gap: 12px;
    position: sticky; top: 0; z-index: 10;
    box-shadow: var(--shadow);
  }
  header h1 { font-size: 17px; font-weight: 600; }
  header .badge {
    font-size: 11px; background: var(--accent-light); color: var(--accent);
    padding: 2px 8px; border-radius: 20px; font-weight: 600;
  }
  .tabs {
    display: flex; border-bottom: 1px solid var(--border);
    background: var(--surface); padding: 0 20px; gap: 0;
  }
  .tab {
    padding: 12px 20px; font-size: 14px; font-weight: 500;
    color: var(--text2); border: none; background: none;
    cursor: pointer; border-bottom: 2px solid transparent;
    transition: all .15s;
  }
  .tab.active { color: var(--accent); border-bottom-color: var(--accent); }

  .page { display: none; padding: 20px; max-width: 700px; margin: 0 auto; }
  .page.active { display: block; }

  .card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 20px; margin-bottom: 16px;
    box-shadow: var(--shadow);
  }
  .card h2 { font-size: 15px; font-weight: 600; margin-bottom: 16px;
              padding-bottom: 10px; border-bottom: 1px solid var(--border); }

  .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .form-group { display: flex; flex-direction: column; gap: 5px; }
  .form-group.full { grid-column: 1 / -1; }
  label { font-size: 13px; font-weight: 500; color: var(--text2); }
  input, select, textarea {
    padding: 9px 12px; border: 1px solid var(--border);
    border-radius: 7px; font-size: 14px; font-family: inherit;
    background: var(--bg); color: var(--text);
    transition: border-color .15s;
    width: 100%;
  }
  input:focus, select:focus, textarea:focus {
    outline: none; border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(61,90,255,.1);
  }
  .qty-input { width: 80px; }

  .btn {
    display: inline-flex; align-items: center; justify-content: center;
    gap: 6px; padding: 10px 20px; border-radius: 8px;
    font-size: 14px; font-weight: 600; cursor: pointer;
    border: none; transition: all .15s;
  }
  .btn-primary { background: var(--accent); color: #fff; }
  .btn-primary:hover { background: #2d4aef; }
  .btn-primary:disabled { opacity: .5; cursor: default; }
  .btn-secondary { background: var(--bg); color: var(--text2); border: 1px solid var(--border); }
  .btn-secondary:hover { border-color: var(--accent); color: var(--accent); }

  .alert {
    padding: 12px 14px; border-radius: 8px; font-size: 14px;
    margin-bottom: 14px; display: none;
  }
  .alert.success { background: var(--success-light); color: var(--success); border: 1px solid #a7f3d0; }
  .alert.error   { background: #fff5f5; color: #c53030; border: 1px solid #feb2b2; }
  .alert.show    { display: block; }

  /* 予約一覧テーブル */
  .table-wrap { overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th { background: var(--bg); padding: 9px 12px; text-align: left;
       font-weight: 600; font-size: 12px; color: var(--text2);
       border-bottom: 1px solid var(--border); white-space: nowrap; }
  td { padding: 9px 12px; border-bottom: 1px solid var(--border);
       vertical-align: middle; }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: var(--bg); }

  .status-badge {
    display: inline-block; padding: 2px 8px; border-radius: 20px;
    font-size: 11px; font-weight: 600; white-space: nowrap;
  }
  .status-pending  { background: var(--warn-light); color: var(--warn); }
  .status-done     { background: var(--success-light); color: var(--success); }
  .status-waiting  { background: #f0f0f0; color: #666; }

  .empty { text-align: center; padding: 40px 20px; color: var(--text2); font-size: 14px; }

  .filter-row { display: flex; gap: 10px; margin-bottom: 14px; flex-wrap: wrap; }
  .filter-row input, .filter-row select { max-width: 200px; }

  .spinner {
    display: inline-block; width: 16px; height: 16px;
    border: 2px solid rgba(255,255,255,.4); border-top-color: #fff;
    border-radius: 50%; animation: spin .7s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* 設定 */
  .settings-row { display: flex; flex-direction: column; gap: 5px; margin-bottom: 14px; }
  .settings-row label { font-size: 13px; font-weight: 500; color: var(--text2); }

  @media (max-width: 500px) {
    .form-grid { grid-template-columns: 1fr; }
    .form-group.full { grid-column: 1; }
  }
</style>
</head>
<body>

<header>
  <h1>商品予約</h1>
  <span class="badge">店舗用</span>
</header>

<div class="tabs">
  <button class="tab active" onclick="switchTab('form')">予約を入れる</button>
  <button class="tab" onclick="switchTab('list')">予約状況</button>
  <button class="tab" onclick="switchTab('settings')">設定</button>
</div>

<!-- 予約入力 -->
<div id="page-form" class="page active">
  <div class="card">
    <h2>新規予約入力</h2>
    <div id="alert-form" class="alert"></div>
    <div class="form-grid">
      <div class="form-group full">
        <label>商品名 <span style="color:red">*</span></label>
        <input type="text" id="productName" placeholder="例: ナイキ エアマックス 2025">
      </div>
      <div class="form-group">
        <label>カラー</label>
        <input type="text" id="color" placeholder="例: ブラック">
      </div>
      <div class="form-group">
        <label>サイズ</label>
        <input type="text" id="size" placeholder="例: 26.5cm">
      </div>
      <div class="form-group">
        <label>数量 <span style="color:red">*</span></label>
        <input type="number" id="qty" value="1" min="1" class="qty-input">
      </div>
      <div class="form-group">
        <label>お客様名 / 注文番号 <span style="color:red">*</span></label>
        <input type="text" id="customerName" placeholder="例: 田中 太郎">
      </div>
      <div class="form-group full">
        <label>備考</label>
        <input type="text" id="note" placeholder="例: 取り置き希望、連絡事項など">
      </div>
    </div>
    <div style="margin-top:16px; display:flex; justify-content:flex-end;">
      <button class="btn btn-primary" id="submitBtn" onclick="submitReservation()">
        予約を登録
      </button>
    </div>
  </div>
</div>

<!-- 予約状況 -->
<div id="page-list" class="page">
  <div class="card">
    <h2>予約状況一覧</h2>
    <div class="filter-row">
      <input type="text" id="filterProduct" placeholder="商品名で絞り込み" oninput="renderList()">
      <select id="filterStatus" onchange="renderList()">
        <option value="">すべて</option>
        <option value="未振り分け">未振り分け</option>
        <option value="振り分け済み">振り分け済み</option>
      </select>
      <button class="btn btn-secondary" onclick="loadReservations()">更新</button>
    </div>
    <div id="list-alert" class="alert"></div>
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>受付日時</th>
            <th>商品名</th>
            <th>カラー</th>
            <th>サイズ</th>
            <th>数量</th>
            <th>お客様名</th>
            <th>ステータス</th>
          </tr>
        </thead>
        <tbody id="listBody"></tbody>
      </table>
      <div id="list-empty" class="empty" style="display:none">予約データがありません</div>
    </div>
  </div>
</div>

<!-- 設定 -->
<div id="page-settings" class="page">
  <div class="card">
    <h2>設定</h2>
    <div class="settings-row">
      <label>GAS エンドポイント URL</label>
      <input type="url" id="gasUrl" placeholder="https://script.google.com/macros/s/...">
    </div>
    <div class="settings-row">
      <label>この店舗の名前</label>
      <input type="text" id="storeName" placeholder="例: 銀座店">
    </div>
    <div style="margin-top:4px; display:flex; justify-content:flex-end; gap:10px;">
      <button class="btn btn-secondary" onclick="testConnection()">接続テスト</button>
      <button class="btn btn-primary" onclick="saveSettings()">保存</button>
    </div>
    <div id="settings-alert" class="alert" style="margin-top:12px;"></div>
  </div>
</div>

<script>
// ===== 設定管理 =====
const STORAGE_URL  = 'alloc_gasUrl';
const STORAGE_STORE = 'alloc_storeName';

let allReservations = [];

function loadSettings() {
  document.getElementById('gasUrl').value   = localStorage.getItem(STORAGE_URL)   || '';
  document.getElementById('storeName').value = localStorage.getItem(STORAGE_STORE) || '';
}
function saveSettings() {
  const url   = document.getElementById('gasUrl').value.trim();
  const store = document.getElementById('storeName').value.trim();
  localStorage.setItem(STORAGE_URL,   url);
  localStorage.setItem(STORAGE_STORE, store);
  showAlert('settings-alert', '設定を保存しました', 'success');
}
function getGasUrl() { return localStorage.getItem(STORAGE_URL) || ''; }
function getStoreName() { return localStorage.getItem(STORAGE_STORE) || ''; }

async function testConnection() {
  const url = getGasUrl();
  if (!url) { showAlert('settings-alert', 'URLを入力してください', 'error'); return; }
  try {
    const r = await fetch(url + '?action=getStores');
    const d = await r.json();
    if (d.stores) showAlert('settings-alert', '接続成功！ 店舗数: ' + d.stores.length, 'success');
    else          showAlert('settings-alert', 'エラー: ' + JSON.stringify(d), 'error');
  } catch(e) {
    showAlert('settings-alert', '接続失敗: ' + e.message, 'error');
  }
}

// ===== タブ =====
function switchTab(name) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.getElementById('page-' + name).classList.add('active');
  event.target.classList.add('active');
  if (name === 'list') loadReservations();
}

// ===== 予約登録 =====
async function submitReservation() {
  const url       = getGasUrl();
  const storeName = getStoreName();
  if (!url)       { showAlert('alert-form', 'GAS URLが設定されていません（設定タブで入力してください）', 'error'); return; }
  if (!storeName) { showAlert('alert-form', '店舗名が設定されていません（設定タブで入力してください）', 'error'); return; }

  const productName  = document.getElementById('productName').value.trim();
  const color        = document.getElementById('color').value.trim();
  const size         = document.getElementById('size').value.trim();
  const qty          = parseInt(document.getElementById('qty').value) || 1;
  const customerName = document.getElementById('customerName').value.trim();
  const note         = document.getElementById('note').value.trim();

  if (!productName)  { showAlert('alert-form', '商品名を入力してください', 'error'); return; }
  if (!customerName) { showAlert('alert-form', 'お客様名 / 注文番号を入力してください', 'error'); return; }

  const btn = document.getElementById('submitBtn');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span> 登録中...';

  try {
    const res = await fetch(url, {
      method: 'POST',
      body: JSON.stringify({
        action: 'addReservation',
        storeName, productName, color, size, qty, customerName, note,
        reservedAt: new Date().toISOString()
      })
    });
    const data = await res.json();
    if (data.success) {
      showAlert('alert-form', `予約を受け付けました（受付番号: ${data.id}）`, 'success');
      document.getElementById('productName').value  = '';
      document.getElementById('color').value        = '';
      document.getElementById('size').value         = '';
      document.getElementById('qty').value          = '1';
      document.getElementById('customerName').value = '';
      document.getElementById('note').value         = '';
    } else {
      showAlert('alert-form', 'エラー: ' + (data.error || '不明なエラー'), 'error');
    }
  } catch(e) {
    showAlert('alert-form', '通信エラー: ' + e.message, 'error');
  } finally {
    btn.disabled = false;
    btn.textContent = '予約を登録';
  }
}

// ===== 予約一覧 =====
async function loadReservations() {
  const url       = getGasUrl();
  const storeName = getStoreName();
  if (!url) { showAlert('list-alert', '設定タブでGAS URLを設定してください', 'error'); return; }

  try {
    const r = await fetch(url + '?action=getReservations' + (storeName ? '&storeName=' + encodeURIComponent(storeName) : ''));
    const d = await r.json();
    allReservations = d.reservations || [];
    renderList();
  } catch(e) {
    showAlert('list-alert', '取得失敗: ' + e.message, 'error');
  }
}

function renderList() {
  const filterProd   = document.getElementById('filterProduct').value.trim().toLowerCase();
  const filterStatus = document.getElementById('filterStatus').value;

  let filtered = allReservations.filter(r => {
    const matchProd   = !filterProd   || (r['商品名'] || '').toLowerCase().includes(filterProd);
    const matchStatus = !filterStatus || r['ステータス'] === filterStatus;
    return matchProd && matchStatus;
  });

  // 新しい順
  filtered.sort((a, b) => new Date(b['予約日時']) - new Date(a['予約日時']));

  const tbody = document.getElementById('listBody');
  const empty = document.getElementById('list-empty');
  tbody.innerHTML = '';

  if (!filtered.length) { empty.style.display = 'block'; return; }
  empty.style.display = 'none';

  filtered.forEach(r => {
    const tr = document.createElement('tr');
    const dt = new Date(r['予約日時']);
    const dateStr = isNaN(dt) ? r['予約日時'] : `${dt.getMonth()+1}/${dt.getDate()} ${dt.getHours()}:${String(dt.getMinutes()).padStart(2,'0')}`;
    const status  = r['ステータス'] || '未振り分け';
    const cls     = status === '振り分け済み' ? 'status-done' : status === '未振り分け' ? 'status-pending' : 'status-waiting';
    tr.innerHTML = `
      <td>${dateStr}</td>
      <td>${esc(r['商品名'] || '')}</td>
      <td>${esc(r['カラー'] || '')}</td>
      <td>${esc(r['サイズ']  || '')}</td>
      <td>${r['数量'] || 1}</td>
      <td>${esc(r['お客様名/注文番号'] || '')}</td>
      <td><span class="status-badge ${cls}">${esc(status)}</span></td>
    `;
    tbody.appendChild(tr);
  });
}

// ===== ユーティリティ =====
function esc(str) {
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
function showAlert(id, msg, type) {
  const el = document.getElementById(id);
  el.textContent = msg;
  el.className = 'alert ' + type + ' show';
  setTimeout(() => el.classList.remove('show'), 5000);
}

// ===== 初期化 =====
loadSettings();
</script>
</body>
</html>
