<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>商品マスタ インポート</title>
<style>
  :root { --accent:#4f46e5; --green:#059669; --red:#dc2626; --border:#e2e6f0; --bg:#f4f6fb; }
  * { box-sizing:border-box; margin:0; padding:0; }
  body { font-family:-apple-system,BlinkMacSystemFont,'Hiragino Sans','Meiryo',sans-serif;
         background:var(--bg); padding:30px 20px; font-size:14px; color:#1a1d2e; }
  .card { background:#fff; border:1px solid var(--border); border-radius:10px;
          padding:24px; max-width:600px; margin:0 auto; box-shadow:0 1px 4px rgba(0,0,0,.07); }
  h1 { font-size:17px; font-weight:700; margin-bottom:4px; }
  p  { font-size:13px; color:#5c607a; margin-bottom:20px; }
  label { font-size:12px; font-weight:600; color:#5c607a; display:block; margin-bottom:5px; }
  input { width:100%; padding:9px 12px; border:1px solid var(--border); border-radius:7px;
          font-size:13px; margin-bottom:14px; }
  input:focus { outline:none; border-color:var(--accent); box-shadow:0 0 0 3px rgba(79,70,229,.1); }
  .btn { display:inline-flex; align-items:center; gap:6px; padding:10px 20px;
         border-radius:7px; font-size:13px; font-weight:600; cursor:pointer;
         border:none; width:100%; justify-content:center; transition:all .15s; }
  .btn-primary { background:var(--accent); color:#fff; }
  .btn-primary:hover { background:#4338ca; }
  .btn:disabled { opacity:.5; cursor:not-allowed; }
  .alert { padding:11px 14px; border-radius:7px; font-size:13px; margin-top:14px; display:none; }
  .alert.show { display:block; }
  .alert.success { background:#ecfdf5; color:var(--green); border:1px solid #6ee7b7; }
  .alert.error   { background:#fef2f2; color:var(--red);   border:1px solid #fca5a5; }
  .alert.warn    { background:#fffbeb; color:#d97706;       border:1px solid #fde68a; }
  .progress { height:6px; background:#e2e6f0; border-radius:3px; margin-top:12px; overflow:hidden; display:none; }
  .progress-bar { height:100%; background:var(--accent); border-radius:3px; transition:width .3s; }
  .spinner { display:inline-block; width:14px; height:14px; border:2px solid rgba(255,255,255,.4);
             border-top-color:#fff; border-radius:50%; animation:spin .7s linear infinite; }
  @keyframes spin { to { transform:rotate(360deg); } }
</style>
</head>
<body>
<div class="card">
  <h1>商品マスタ インポート</h1>
  <p>CSVファイル（Shift-JIS）を選択して「インポート実行」を押してください。JANコードと商品名をスプレッドシートに登録します。</p>

  <label>GAS エンドポイント URL</label>
  <input type="url" id="gasUrl" placeholder="https://script.google.com/macros/s/...">

  <label>商品マスタ CSV ファイル（Shift-JIS）</label>
  <input type="file" id="csvFile" accept=".csv">

  <button class="btn btn-primary" id="importBtn" onclick="runImport()">インポート実行</button>

  <div class="progress" id="progress"><div class="progress-bar" id="bar" style="width:0%"></div></div>
  <div class="alert" id="alert"></div>
</div>

<script>
async function runImport() {
  const url  = document.getElementById('gasUrl').value.trim();
  const file = document.getElementById('csvFile').files[0];

  if (!url)  { show('GAS URLを入力してください', 'error'); return; }
  if (!file) { show('CSVファイルを選択してください', 'error'); return; }

  const btn = document.getElementById('importBtn');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span> 読み込み中...';
  document.getElementById('progress').style.display = 'block';
  setBar(10);

  try {
    // Shift-JISで読み込み
    const text = await readShiftJIS(file);
    setBar(30);

    // CSV解析
    const lines = text.split(/\r?\n/);
    const items = [];
    for (let i = 1; i < lines.length; i++) {
      const cols = parseCSVLine(lines[i]);
      const jan  = (cols[4] || '').trim();
      const name = (cols[8] || '').trim();
      if (jan && name) items.push({ jan, name });
    }

    show(`${items.length}件を読み込みました。スプレッドシートへ送信中...`, 'warn');
    setBar(50);
    btn.innerHTML = '<span class="spinner"></span> 送信中...';

    // 5000件ずつ分割送信
    const CHUNK = 5000;
    let total = 0;
    for (let i = 0; i < items.length; i += CHUNK) {
      const chunk = items.slice(i, i + CHUNK);
      const action = i === 0 ? 'importMaster' : 'appendMaster';
      const res = await fetch(url, {
        method: 'POST',
        body: JSON.stringify({ action: i === 0 ? 'importMaster' : 'appendMaster', items: chunk, append: i > 0 })
      });
      const d = await res.json();
      if (d.error) throw new Error(d.error);
      total += chunk.length;
      setBar(50 + Math.round((total / items.length) * 50));
    }

    setBar(100);
    show(`✅ インポート完了！ ${items.length}件を登録しました`, 'success');
  } catch(e) {
    show('エラー: ' + e.message, 'error');
  } finally {
    btn.disabled = false;
    btn.textContent = 'インポート実行';
  }
}

function readShiftJIS(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = e => resolve(e.target.result);
    reader.onerror = reject;
    reader.readAsText(file, 'Shift-JIS');
  });
}

function parseCSVLine(line) {
  const result = [];
  let cur = '', inQ = false;
  for (let i = 0; i < line.length; i++) {
    const c = line[i];
    if (c === '"') { inQ = !inQ; }
    else if (c === ',' && !inQ) { result.push(cur); cur = ''; }
    else { cur += c; }
  }
  result.push(cur);
  return result;
}

function setBar(pct) {
  document.getElementById('bar').style.width = pct + '%';
}
function show(msg, type) {
  const el = document.getElementById('alert');
  el.textContent = msg;
  el.className = 'alert ' + type + ' show';
}
</script>
</body>
</html>
