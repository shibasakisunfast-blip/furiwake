<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>振り分け管理</title>
<style>
:root {
  --bg: #f4f6fb;
  --surface: #ffffff;
  --border: #e2e6f0;
  --text: #1a1d2e;
  --text2: #5c607a;
  --accent: #4f46e5;
  --accent-l: #eef2ff;
  --green: #059669;
  --green-l: #ecfdf5;
  --amber: #d97706;
  --amber-l: #fffbeb;
  --red: #dc2626;
  --red-l: #fef2f2;
  --radius: 10px;
  --shadow: 0 1px 4px rgba(0,0,0,.07);
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,BlinkMacSystemFont,'Hiragino Sans','Meiryo',sans-serif;background:var(--bg);color:var(--text);font-size:14px;line-height:1.6;}

/* ヘッダー */
header{background:var(--surface);border-bottom:1px solid var(--border);padding:12px 20px;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:100;box-shadow:var(--shadow);}
header h1{font-size:16px;font-weight:700;}
.badge{font-size:11px;background:var(--accent-l);color:var(--accent);padding:2px 8px;border-radius:20px;font-weight:600;}
.header-right{margin-left:auto;display:flex;align-items:center;gap:10px;}

/* タブ */
.tabs{display:flex;background:var(--surface);border-bottom:1px solid var(--border);padding:0 20px;gap:0;overflow-x:auto;}
.tab{padding:11px 18px;font-size:13px;font-weight:500;color:var(--text2);border:none;background:none;cursor:pointer;border-bottom:2px solid transparent;transition:all .15s;white-space:nowrap;}
.tab.active{color:var(--accent);border-bottom-color:var(--accent);}

/* ページ */
.page{display:none;padding:20px;max-width:1000px;margin:0 auto;}
.page.active{display:block;}

/* カード */
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:20px;margin-bottom:16px;box-shadow:var(--shadow);}
.card-title{font-size:15px;font-weight:600;margin-bottom:16px;padding-bottom:10px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;gap:10px;}

/* フォーム */
label{font-size:12px;font-weight:600;color:var(--text2);}
input,select,textarea{padding:8px 11px;border:1px solid var(--border);border-radius:7px;font-size:13px;font-family:inherit;background:var(--bg);color:var(--text);width:100%;transition:border-color .15s;}
input:focus,select:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px rgba(79,70,229,.1);}
.fg{display:flex;flex-direction:column;gap:4px;}
.row{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:10px;}
.row .fg{flex:1;min-width:120px;}
.row .fg.w80{flex:none;width:80px;}
.row .fg.w120{flex:none;width:120px;}
.row .fg.w160{flex:none;width:160px;}

/* ボタン */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:5px;padding:8px 16px;border-radius:7px;font-size:13px;font-weight:600;cursor:pointer;border:none;transition:all .15s;}
.btn-primary{background:var(--accent);color:#fff;}
.btn-primary:hover{background:#4338ca;}
.btn-green{background:var(--green);color:#fff;}
.btn-green:hover{background:#047857;}
.btn-ghost{background:var(--bg);color:var(--text2);border:1px solid var(--border);}
.btn-ghost:hover{border-color:var(--accent);color:var(--accent);}
.btn-red{background:var(--red-l);color:var(--red);border:1px solid #fecaca;}
.btn-red:hover{background:#fee2e2;}
.btn:disabled{opacity:.45;cursor:not-allowed;}
.btn-sm{padding:5px 11px;font-size:12px;border-radius:6px;}

/* アラート */
.alert{padding:10px 14px;border-radius:7px;font-size:13px;margin-bottom:12px;display:none;}
.alert.show{display:block;}
.alert.success{background:var(--green-l);color:var(--green);border:1px solid #6ee7b7;}
.alert.error{background:var(--red-l);color:var(--red);border:1px solid #fca5a5;}
.alert.warn{background:var(--amber-l);color:var(--amber);border:1px solid #fde68a;}

/* スピナー */
.spinner{display:inline-block;width:13px;height:13px;border:2px solid rgba(255,255,255,.4);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}

/* テーブル */
.table-wrap{overflow-x:auto;}
table{width:100%;border-collapse:collapse;font-size:13px;}
th{background:var(--bg);padding:8px 10px;text-align:left;font-weight:600;font-size:11px;color:var(--text2);border-bottom:1px solid var(--border);white-space:nowrap;}
td{padding:8px 10px;border-bottom:1px solid var(--border);vertical-align:middle;}
tr:last-child td{border-bottom:none;}
tr:hover td{background:#f9faff;}
.empty{text-align:center;padding:40px;color:var(--text2);}

/* 商品検索 */
.search-box{position:relative;}
.search-box input{padding-left:32px;}
.search-icon{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--text2);font-size:14px;pointer-events:none;}
.search-results{position:absolute;top:calc(100% + 4px);left:0;right:0;background:var(--surface);border:1px solid var(--border);border-radius:8px;box-shadow:0 4px 16px rgba(0,0,0,.12);z-index:200;max-height:260px;overflow-y:auto;display:none;}
.search-results.show{display:block;}
.search-item{padding:9px 12px;cursor:pointer;border-bottom:1px solid var(--border);transition:background .1s;}
.search-item:last-child{border-bottom:none;}
.search-item:hover{background:var(--accent-l);}
.search-item .jan{font-size:11px;color:var(--text2);font-family:monospace;}
.search-item .name{font-size:13px;font-weight:500;}
.search-loading{padding:12px;text-align:center;color:var(--text2);font-size:13px;}

/* 振り分け行 */
.alloc-table{width:100%;border-collapse:collapse;}
.alloc-table th{background:#f8f9ff;padding:7px 10px;font-size:11px;font-weight:600;color:var(--text2);border-bottom:1px solid var(--border);}
.alloc-table td{padding:6px 8px;border-bottom:1px solid var(--border);vertical-align:middle;}
.alloc-table tr:last-child td{border-bottom:none;}
.alloc-table input[type=number]{width:70px;text-align:right;}
.alloc-table input[type=text]{font-size:12px;}

/* 商品カード */
.product-card{border:1px solid var(--border);border-radius:8px;overflow:hidden;margin-bottom:12px;background:var(--surface);}
.product-card-header{background:#f8f9ff;padding:12px 14px;display:flex;align-items:center;gap:10px;border-bottom:1px solid var(--border);}
.product-card-header .pname{font-weight:600;font-size:13px;flex:1;}
.product-card-header .pjan{font-family:monospace;font-size:11px;color:var(--text2);}
.product-card-body{padding:12px;}

/* サマリ */
.stat-row{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:16px;}
.stat{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:12px 16px;flex:1;min-width:100px;}
.stat-label{font-size:11px;color:var(--text2);font-weight:600;}
.stat-val{font-size:22px;font-weight:700;line-height:1.3;}
.stat-val.blue{color:var(--accent);}
.stat-val.green{color:var(--green);}
.stat-val.amber{color:var(--amber);}

/* 設定 */
.settings-fg{display:flex;flex-direction:column;gap:5px;margin-bottom:14px;}
</style>
</head>
<body>

<header>
  <h1>振り分け管理</h1>
  <span class="badge">管理側</span>
  <div class="header-right">
    <span id="hdate" style="font-size:12px;color:var(--text2);"></span>
  </div>
</header>

<div class="tabs">
  <button class="tab active" onclick="switchTab('alloc')">振り分け入力</button>
  <button class="tab" onclick="switchTab('history')">振り分け履歴</button>
  <button class="tab" onclick="switchTab('settings')">設定</button>
</div>

<!-- ===== 振り分け入力 ===== -->
<div id="page-alloc" class="page active">
  <div class="card">
    <div class="card-title">
      <span>商品を追加</span>
    </div>

    <!-- JANコード検索 -->
    <div class="row" style="align-items:flex-end;">
      <div class="fg" style="flex:1;position:relative;">
        <label>JANコード（部分一致）で商品を検索</label>
        <div class="search-box">
          <span class="search-icon">🔍</span>
          <input type="text" id="janSearch" placeholder="例: 498972  / 47096..." oninput="onJanInput()" onblur="hideSearchResults()" autocomplete="off">
        </div>
        <div class="search-results" id="searchResults"></div>
      </div>
      <div style="padding-bottom:1px;flex:none;">
        <button class="btn btn-ghost btn-sm" onclick="addManualRow()">＋ 手入力で追加</button>
      </div>
    </div>

    <div id="alloc-alert" class="alert"></div>

    <!-- 商品カードリスト -->
    <div id="product-list">
      <div class="empty" id="product-empty">商品を検索または手入力で追加してください</div>
    </div>

    <!-- 送信エリア -->
    <div id="send-area" style="display:none;border-top:1px solid var(--border);padding-top:16px;margin-top:8px;">
      <div class="row" style="align-items:flex-end;">
        <div class="fg" style="flex:1;">
          <label>メール件名（省略時: 【振り分けのご連絡】店舗名 様）</label>
          <input type="text" id="mailSubject" placeholder="例: 【新商品振り分け】6月分">
        </div>
        <div style="flex:none;">
          <button class="btn btn-green" id="sendBtn" onclick="sendAllNotifications()">
            ✉ 全店舗へ通知送信
          </button>
        </div>
      </div>
      <div id="send-alert" class="alert" style="margin-top:10px;margin-bottom:0;"></div>
    </div>
  </div>
</div>

<!-- ===== 振り分け履歴 ===== -->
<div id="page-history" class="page">
  <div class="card">
    <div class="card-title">
      振り分け履歴
      <button class="btn btn-ghost btn-sm" onclick="loadHistory()">更新</button>
    </div>
    <div id="history-alert" class="alert"></div>
    <div class="table-wrap">
      <table>
        <thead><tr>
          <th>バッチID</th><th>作成日時</th><th>店舗</th><th>商品名</th><th>JAN</th><th>数量</th><th>備考</th><th>通知</th>
        </tr></thead>
        <tbody id="history-body"></tbody>
      </table>
      <div id="history-empty" class="empty" style="display:none;">履歴がありません</div>
    </div>
  </div>
</div>

<!-- ===== 設定 ===== -->
<div id="page-settings" class="page">
  <div class="card">
    <div class="card-title">設定</div>
    <div class="settings-fg">
      <label>GAS エンドポイント URL</label>
      <input type="url" id="s-url" placeholder="https://script.google.com/macros/s/...">
    </div>
    <div style="display:flex;gap:10px;justify-content:flex-end;">
      <button class="btn btn-ghost" onclick="testConn()">接続テスト</button>
      <button class="btn btn-primary" onclick="saveSettings()">保存</button>
    </div>
    <div id="settings-alert" class="alert" style="margin-top:12px;"></div>
  </div>
</div>

<script>
// ========== 状態 ==========
const GAS_KEY = 'furiwake_gasUrl';
let stores = [];
let products = []; // 振り分け入力中の商品リスト [{id, jan, name, rows:[{store,qty,note}]}]
let productIdCounter = 0;
let searchTimer = null;
let masterCache = {}; // JAN検索キャッシュ

// ========== 初期化 ==========
window.onload = () => {
  document.getElementById('s-url').value = localStorage.getItem(GAS_KEY) || '';
  document.getElementById('hdate').textContent = new Date().toLocaleDateString('ja-JP');
  loadStores();
};

function getUrl() { return localStorage.getItem(GAS_KEY) || ''; }
function saveSettings() {
  localStorage.setItem(GAS_KEY, document.getElementById('s-url').value.trim());
  showAlert('settings-alert', '保存しました', 'success');
  loadStores();
}
async function testConn() {
  const url = getUrl();
  if (!url) { showAlert('settings-alert', 'URLを入力してください', 'error'); return; }
  try {
    const r = await fetch(url + '?action=getStores');
    const d = await r.json();
    if (d.stores) showAlert('settings-alert', `接続成功！ 店舗数: ${d.stores.length}`, 'success');
    else showAlert('settings-alert', 'エラー: ' + JSON.stringify(d), 'error');
  } catch(e) { showAlert('settings-alert', '接続失敗: ' + e.message, 'error'); }
}

// ========== タブ ==========
function switchTab(name) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.getElementById('page-' + name).classList.add('active');
  event.target.classList.add('active');
  if (name === 'history') loadHistory();
}

// ========== 店舗読み込み ==========
async function loadStores() {
  const url = getUrl();
  if (!url) return;
  try {
    const r = await fetch(url + '?action=getStores');
    const d = await r.json();
    stores = d.stores || [];
    // 既存の商品カードの店舗行を更新
    renderAllProducts();
  } catch(e) { console.warn('店舗読み込み失敗:', e.message); }
}

// ========== JAN検索 ==========
function onJanInput() {
  clearTimeout(searchTimer);
  const val = document.getElementById('janSearch').value.trim();
  if (val.length < 4) { hideSearchResults(); return; }
  searchTimer = setTimeout(() => searchJan(val), 300);
}

async function searchJan(query) {
  const url = getUrl();
  if (!url) return;

  // キャッシュ確認
  if (masterCache[query]) {
    showResults(masterCache[query]);
    return;
  }

  const el = document.getElementById('searchResults');
  el.innerHTML = '<div class="search-loading">検索中...</div>';
  el.classList.add('show');

  try {
    const r = await fetch(`${url}?action=searchMaster&query=${encodeURIComponent(query)}`);
    const d = await r.json();
    masterCache[query] = d.items || [];
    showResults(d.items || []);
  } catch(e) {
    el.innerHTML = '<div class="search-loading">検索失敗</div>';
  }
}

function showResults(items) {
  const el = document.getElementById('searchResults');
  if (!items.length) {
    el.innerHTML = '<div class="search-loading">該当なし</div>';
    el.classList.add('show');
    return;
  }
  el.innerHTML = items.slice(0, 30).map(item =>
    `<div class="search-item" onmousedown="selectProduct('${esc(item.jan)}','${esc(item.name).replace(/'/g,"\\'")}')">
      <div class="jan">${esc(item.jan)}</div>
      <div class="name">${esc(item.name)}</div>
    </div>`
  ).join('');
  el.classList.add('show');
}

function hideSearchResults() {
  setTimeout(() => {
    document.getElementById('searchResults').classList.remove('show');
  }, 200);
}

function selectProduct(jan, name) {
  document.getElementById('janSearch').value = '';
  hideSearchResults();
  addProductCard(jan, name);
}

// ========== 手入力追加 ==========
function addManualRow() {
  addProductCard('', '');
}

// ========== 商品カード追加 ==========
function addProductCard(jan, name) {
  const id = ++productIdCounter;
  products.push({ id, jan, name, rows: stores.map(s => ({ store: s.name, qty: 0, note: '' })) });
  document.getElementById('product-empty').style.display = 'none';
  renderAllProducts();
  updateSendArea();
}

function removeProduct(id) {
  products = products.filter(p => p.id !== id);
  renderAllProducts();
  if (!products.length) document.getElementById('product-empty').style.display = 'block';
  updateSendArea();
}

// ========== 商品カードレンダリング ==========
function renderAllProducts() {
  const container = document.getElementById('product-list');
  // 既存カードを削除（emptyは残す）
  container.querySelectorAll('.product-card').forEach(el => el.remove());

  products.forEach(p => {
    const div = document.createElement('div');
    div.className = 'product-card';
    div.id = 'pcard-' + p.id;

    const storeRows = (stores.length ? stores : []).map(s => {
      const existing = p.rows.find(r => r.store === s.name) || { store: s.name, qty: 0, note: '' };
      return `<tr>
        <td style="font-size:13px;font-weight:500;">${esc(s.name)}</td>
        <td><input type="number" min="0" value="${existing.qty}" placeholder="0"
          onchange="updateRow(${p.id},'${esc(s.name)}','qty',this.value)"></td>
        <td><input type="text" value="${esc(existing.note)}" placeholder="備考（任意）"
          onchange="updateRow(${p.id},'${esc(s.name)}','note',this.value)"></td>
      </tr>`;
    }).join('');

    const noStoreMsg = stores.length === 0
      ? '<tr><td colspan="3" style="padding:12px;color:var(--text2);">設定タブでGAS URLを設定し、店舗マスタを登録してください</td></tr>'
      : '';

    div.innerHTML = `
      <div class="product-card-header">
        <div style="flex:1;display:flex;flex-direction:column;gap:4px;">
          <input type="text" value="${esc(p.jan)}" placeholder="JANコード"
            style="font-family:monospace;font-size:12px;width:160px;"
            onchange="updateProductField(${p.id},'jan',this.value)">
          <input type="text" value="${esc(p.name)}" placeholder="商品名"
            style="font-size:13px;font-weight:500;"
            onchange="updateProductField(${p.id},'name',this.value)">
        </div>
        <button class="btn btn-red btn-sm" onclick="removeProduct(${p.id})">削除</button>
      </div>
      <div class="product-card-body">
        <table class="alloc-table">
          <thead><tr><th style="width:140px;">店舗</th><th style="width:80px;">数量</th><th>備考</th></tr></thead>
          <tbody>${storeRows}${noStoreMsg}</tbody>
        </table>
      </div>
    `;
    container.appendChild(div);
  });
}

function updateProductField(id, field, value) {
  const p = products.find(p => p.id === id);
  if (p) p[field] = value;
}

function updateRow(productId, storeName, field, value) {
  const p = products.find(p => p.id === productId);
  if (!p) return;
  let row = p.rows.find(r => r.store === storeName);
  if (!row) { row = { store: storeName, qty: 0, note: '' }; p.rows.push(row); }
  row[field] = field === 'qty' ? (parseInt(value) || 0) : value;
}

function updateSendArea() {
  document.getElementById('send-area').style.display = products.length ? 'block' : 'none';
}

// ========== メール送信 ==========
async function sendAllNotifications() {
  const url = getUrl();
  if (!url) { showAlert('alloc-alert', 'GAS URLが設定されていません', 'error'); return; }

  // 送信データ構築（数量>0の行のみ）
  const allocations = [];
  let valid = false;
  for (const p of products) {
    for (const row of p.rows) {
      if (row.qty > 0) {
        allocations.push({
          storeName:   row.store,
          productName: p.name,
          jan:         p.jan,
          qty:         row.qty,
          note:        row.note || ''
        });
        valid = true;
      }
    }
  }

  if (!valid) { showAlert('send-alert', '数量が1以上の行がありません', 'warn'); return; }

  const subject = document.getElementById('mailSubject').value.trim();
  const btn = document.getElementById('sendBtn');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span> 送信中...';

  try {
    const saveRes = await post(url, { action: 'saveAllocation', allocations });
    const notifyRes = await post(url, {
      action: 'sendNotification',
      batchId: saveRes.batchId,
      allocations,
      subject: subject || undefined
    });
    const msg = `送信完了: ${(notifyRes.sent||[]).join(', ')||'0件'}` +
      (notifyRes.errors?.length ? `　エラー: ${notifyRes.errors.join(', ')}` : '');
    showAlert('send-alert', msg, notifyRes.errors?.length ? 'warn' : 'success');
    if (!notifyRes.errors?.length) {
      // 送信成功後クリア
      setTimeout(() => {
        products = [];
        renderAllProducts();
        document.getElementById('product-empty').style.display = 'block';
        updateSendArea();
        document.getElementById('mailSubject').value = '';
      }, 2000);
    }
  } catch(e) {
    showAlert('send-alert', '送信失敗: ' + e.message, 'error');
  } finally {
    btn.disabled = false;
    btn.innerHTML = '✉ 全店舗へ通知送信';
  }
}

// ========== 履歴 ==========
async function loadHistory() {
  const url = getUrl();
  if (!url) { showAlert('history-alert', 'GAS URLが設定されていません', 'error'); return; }
  try {
    const r = await fetch(url + '?action=getAllocations');
    const d = await r.json();
    renderHistory(d.allocations || []);
  } catch(e) { showAlert('history-alert', '取得失敗: ' + e.message, 'error'); }
}

function renderHistory(data) {
  const tbody = document.getElementById('history-body');
  const empty = document.getElementById('history-empty');
  tbody.innerHTML = '';
  if (!data.length) { empty.style.display = 'block'; return; }
  empty.style.display = 'none';
  [...data].reverse().forEach(r => {
    const tr = document.createElement('tr');
    const dt = new Date(r['作成日時']);
    const ds = isNaN(dt) ? r['作成日時'] : dt.toLocaleString('ja-JP');
    const notified = r['通知済み'] === 'true' || r['通知済み'] === true;
    tr.innerHTML = `
      <td style="font-family:monospace;font-size:11px;">${esc(r['バッチID']||'')}</td>
      <td style="font-size:12px;white-space:nowrap;">${ds}</td>
      <td>${esc(r['店舗名']||'')}</td>
      <td>${esc(r['商品名']||'')}</td>
      <td style="font-family:monospace;font-size:11px;">${esc(r['JAN']||r['jan']||'')}</td>
      <td style="text-align:right;">${r['振り分け数']||0}</td>
      <td style="font-size:12px;">${esc(r['備考']||'')}</td>
      <td><span style="font-size:11px;padding:2px 7px;border-radius:20px;font-weight:600;background:${notified?'var(--green-l)':'var(--amber-l)'};color:${notified?'var(--green)':'var(--amber)'};">${notified?'送信済':'未送信'}</span></td>
    `;
    tbody.appendChild(tr);
  });
}

// ========== ユーティリティ ==========
function esc(str) {
  return String(str||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function showAlert(id, msg, type) {
  const el = document.getElementById(id);
  el.textContent = msg;
  el.className = 'alert ' + type + ' show';
  setTimeout(() => el.classList.remove('show'), 7000);
}
async function post(url, data) {
  const r = await fetch(url, { method: 'POST', body: JSON.stringify(data) });
  return r.json();
}
